<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hola Mundo Interactivo</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="card">
        <h1>Hola Mundo</h1>
        <p>Haz clic para interactuar con el mensaje.</p>

        <div class="msg" id="mensaje">Listo para empezar</div>
        <button id="boton">Cambiar mensaje</button>
        <div class="contador">Clicks: <span id="clicks">0</span></div>
    </main>

    <script src="script.js"></script>
</body>

</html>
